<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Riservato - Prisma</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; border-top: 6px solid #2c3e50; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 1rem; text-align: center; }
        button { background: #2c3e50; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        #mainContent { display: none; flex-direction: column; align-items: center; width: 100%; padding: 20px; }
        .header { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid #2c3e50; margin-bottom: 30px; }
        .test-card { background: white; padding: 25px; border-radius: 12px; text-decoration: none; color: inherit; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; width: 100%; max-width: 600px; margin-bottom: 15px;}
        .test-info h3 { margin: 0; color: #3498db; }
    </style>
</head>
<body>

    <div id="loginArea" class="login-box">
        <h2 style="color:#2c3e50; margin:0;">Centro Prisma</h2>
        <p style="color:#64748b; font-size:0.9rem;">Inserire la chiave di accesso allo studio</p>
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="checkPass()">Accedi</button>
    </div>

    <div id="mainContent">
        <div class="header">
            <div style="font-weight:800; font-size:1.5rem; color:#2c3e50;">Centro di psicoterapia - Prisma</div>
            <div style="color:#7f8c8d; text-transform:uppercase; letter-spacing:2px; font-size:0.9rem;">Lecce</div>
        </div>

        <a href="SCL90.html" class="test-card">
            <div class="test-info">
                <h3>SCL90</h3>
                <p style="margin:5px 0 0 0; color:#64748b;">Symptom Check List 90 - Valutazione della sintomatologia</p>
            </div>
            <div style="font-size:1.5rem; color:#cbd5e1;">➔</div>
        </a>
        <a href="pid5.html" class="test-card">
            <div class="test-info">
                <h3>PID-5 (Adulto)</h3>
                <p style="margin:5px 0 0 0; color:#64748b;">Versione Clinica 220 Item</p>
            </div>
            <div style="font-size:1.5rem; color:#cbd5e1;">➔</div>
        </a>
        <a href="YSQ.html" class="test-card">
            <div class="test-info">
                <h3>YSQ-S3</h3>
                <p style="margin:5px 0 0 0; color:#64748b;">Young Schema Questionnaire - Valutazione degli schemi maladattivi</p>
            </div>
            <div style="font-size:1.5rem; color:#cbd5e1;">➔</div>
        </a>
    </div>

    <script>
        function checkPass() {
            const p = document.getElementById('passInput').value;
            if (p === 'prisma2026') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                sessionStorage.setItem('auth', 'ok');
            } else {
                alert('Password errata');
            }
        }
        if(sessionStorage.getItem('auth') === 'ok') {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
        }
    </script>
</body>
</html>
